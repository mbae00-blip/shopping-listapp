<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 24px 24px 20px;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; }

    .stats {
      font-size: 0.8rem;
      opacity: 0.8;
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-row input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #4338ca; }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      background: none;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    ul { list-style: none; padding: 8px 0; min-height: 60px; }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.15s;
    }

    li:last-child { border-bottom: none; }
    li:hover { background: #fafafa; }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      transition: all 0.2s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; background: #fee2e2; }

    .clear-row {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      text-align: right;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .clear-btn:hover { color: #ef4444; background: #fee2e2; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛒 쇼핑 리스트</h1>
      <div class="stats" id="stats">항목 없음</div>
    </header>

    <div class="input-row">
      <input type="text" id="newItem" placeholder="아이템을 입력하세요..." maxlength="60">
      <button onclick="addItem()" title="추가">+</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
      <button class="filter-btn" onclick="setFilter('active', this)">미완료</button>
      <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    </div>

    <ul id="list"></ul>

    <div class="clear-row">
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://ffbdvmckfeexlxpmtjxr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmYmR2bWNrZmVleGx4cG10anhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NzQ3NjMsImV4cCI6MjA5MjE1MDc2M30.9PfAfou54kYatF9OrTLiVllG8HBi5zIlEvUQZCL-B-I';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];
    let filter = 'all';

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function updateStats() {
      const total = items.length;
      const done = items.filter(i => i.checked).length;
      const el = document.getElementById('stats');
      if (total === 0) { el.textContent = '항목 없음'; return; }
      el.textContent = `${total}개 중 ${done}개 완료`;
    }

    function render() {
      const ul = document.getElementById('list');
      const visible = items.filter(i =>
        filter === 'all' ? true :
        filter === 'active' ? !i.checked : i.checked
      );

      if (visible.length === 0) {
        ul.innerHTML = `<div class="empty">${filter === 'done' ? '완료된 항목이 없어요' : '아이템을 추가해보세요!'}</div>`;
      } else {
        ul.innerHTML = visible.map(item => `
          <li class="${item.checked ? 'checked' : ''}" data-id="${item.id}">
            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="window._toggle('${item.id}')">
            <span class="item-text">${escHtml(item.text)}</span>
            <button class="delete-btn" onclick="window._remove('${item.id}')" title="삭제">✕</button>
          </li>
        `).join('');
      }

      updateStats();
    }

    async function loadItems() {
      const { data, error } = await supabase
        .from('Shopping_Items')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) { console.error(error); return; }
      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('newItem');
      const text = input.value.trim();
      if (!text) return;
      const { data, error } = await supabase
        .from('Shopping_Items')
        .insert({ text, checked: false })
        .select()
        .single();
      if (error) { console.error(error); return; }
      items.unshift(data);
      input.value = '';
      render();
      input.focus();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.checked = !item.checked;
      render();
      const { error } = await supabase
        .from('Shopping_Items')
        .update({ checked: item.checked })
        .eq('id', id);
      if (error) {
        item.checked = !item.checked;
        console.error(error);
        render();
      }
    }

    async function remove(id) {
      const { error } = await supabase
        .from('Shopping_Items')
        .delete()
        .eq('id', id);
      if (error) { console.error(error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;
      const { error } = await supabase
        .from('Shopping_Items')
        .delete()
        .in('id', checkedIds);
      if (error) { console.error(error); return; }
      items = items.filter(i => !i.checked);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    window._toggle = toggle;
    window._remove = remove;
    window.addItem = addItem;
    window.clearChecked = clearChecked;
    window.setFilter = setFilter;

    document.getElementById('newItem').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.isComposing) addItem();
    });

    loadItems();
  </script>
</body>
</html>
